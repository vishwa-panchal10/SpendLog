{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-panel">
    <div class="auth-box">
        <h2 class="neon-heading text-center">ACCESS TERMINAL</h2>
        <form method="POST" action="{{ url_for('login') }}" class="cyber-form">
            <div class="form-group">
                <label for="email">User Email</label>
                <input type="email" id="email" name="email" required autocomplete="email" class="cyber-input" placeholder="admin@tracker.com">
            </div>
            <div class="form-group">
                <label for="password">Passcode</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" class="cyber-input" placeholder="••••••••">
            </div>
            <button type="submit" class="cyber-btn w-100 mt-4">INITIALIZE SYSTEM</button>
        </form>
        <div class="auth-links text-center mt-3">
            <span class="text-muted">Entity not recognized?</span>
            <a href="{{ url_for('register') }}" class="cyber-link">Register new entity</a>
        </div>
    </div>
</div>
{% endblock %}
