{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-panel">
    <div class="auth-box">
        <h2 class="neon-heading text-center">NEW ENTITY REGISTRATION</h2>
        <form method="POST" action="{{ url_for('register') }}" class="cyber-form">
            <div class="form-group">
                <label for="name">Identifier (Name)</label>
                <input type="text" id="name" name="name" required autocomplete="name" class="cyber-input" placeholder="e.g. John Doe">
            </div>
            <div class="form-group">
                <label for="email">Communication Link (Email)</label>
                <input type="email" id="email" name="email" required autocomplete="email" class="cyber-input" placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label for="password">Security Passcode</label>
                <input type="password" id="password" name="password" required autocomplete="new-password" class="cyber-input" placeholder="••••••••">
            </div>
            <button type="submit" class="cyber-btn w-100 mt-4">ESTABLISH CONNECTION</button>
        </form>
        <div class="auth-links text-center mt-3">
            <span class="text-muted">Already registered?</span>
            <a href="{{ url_for('login') }}" class="cyber-link">Access Terminal</a>
        </div>
    </div>
</div>
{% endblock %}
